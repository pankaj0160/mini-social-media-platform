<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Pulse</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-logo">✦</div>
      <h1 class="brand-name">Pulse</h1>
      <p class="brand-tagline">Share your moment with the world</p>
    </div>
    <div class="auth-card">
      <h2>Create account</h2>
      <p class="auth-subtitle">Join Pulse today — it's free</p>
      <span class="error-msg" id="regGeneralError"></span>
      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="regUsername">Username</label>
          <input type="text" id="regUsername" placeholder="cooluser123" minlength="3" maxlength="30" />
          <span class="error-msg" id="regUsernameError"></span>
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" />
          <span class="error-msg" id="regEmailError"></span>
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="Min. 6 characters" autocomplete="new-password" />
          <span class="error-msg" id="regPasswordError"></span>
        </div>
        <div class="form-group">
          <label for="regConfirm">Confirm Password</label>
          <input type="password" id="regConfirm" placeholder="Repeat password" autocomplete="new-password" />
          <span class="error-msg" id="regConfirmError"></span>
        </div>
        <button type="submit" class="btn-primary btn-full">Create Account</button>
      </form>
      <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
